name: Build & Publish Docker Image

# Triggers when a pull request is merged into main
on:
  push:
    branches: [ "main" ]
    tags:
      - "*.*"       # Matches tags like 1.0, 2.1.3, etc.
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    name: Build and Push to Docker Hub

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Enables multi-platform builds and advanced caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/moup-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/moup-app:${{ github.ref_name }}
          # Cache layers between builds to speed things up
          cache-from: type=gha
          cache-to: type=gha,mode=max
